<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoptare Theme</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link to external CSS -->
    <script src="scripts.js" defer></script> <!-- Link to external JS -->
</head>
<body>
    <header>
        <h1>Adoptare</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Welcome to Adoptare</h2>
            <p>Your one-stop shop for adopting pets!</p>
        </section>
        <section id="products">
            <h2>Products</h2>
            <div class="product-list">
                <!-- Product items will be dynamically inserted here -->
            </div>
        </section>
        <section id="about">
            <h2>About Us</h2>
            <p>We are dedicated to helping pets find their forever homes.</p>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Adoptare. All rights reserved.</p>
    </footer>
</body>
</html>
